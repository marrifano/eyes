<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Eyes — WebAR</title>

  <!-- A-Frame: monta a cena 3D em HTML -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- AR.js para A-Frame: faz o tracking pela camera -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; }

    /* Aviso inicial enquanto a pessoa aponta para o marcador */
    #dica {
      position: fixed; left: 0; right: 0; bottom: 24px;
      margin: 0 auto; width: 88%; max-width: 420px;
      padding: 12px 16px; border-radius: 12px;
      background: rgba(0,0,0,.72); color: #fff;
      font: 14px/1.4 system-ui, sans-serif; text-align: center;
      z-index: 10; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="dica">Aponte a câmera para o marcador <b>Hiro</b> para ver os personagens ao redor.</div>

  <!--
    embedded + arjs: liga o modo AR.
    sourceType: webcam usa a câmera traseira.
    detectionMode/matrixCodeType: tracking do marcador.
  -->
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true"
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">

    <!-- Pre-carrega os modelos. Troque os src pelos seus GLB do Blender. -->
    <a-assets>
      <a-asset-item id="personagem1" src="models/personagem1.glb"></a-asset-item>
      <a-asset-item id="personagem2" src="models/personagem2.glb"></a-asset-item>
      <a-asset-item id="personagem3" src="models/personagem3.glb"></a-asset-item>
    </a-assets>

    <!--
      O <a-marker> é a ÂNCORA. Tudo dentro dele aparece quando o marcador
      "Hiro" é detectado. Os personagens são posicionados EM VOLTA do centro.
      Eixos (em metros, relativo ao marcador):
        x = esquerda(-)/direita(+)
        y = baixo(-)/cima(+)
        z = frente(+, em direção a você)/atrás(-)
    -->
    <a-marker preset="hiro" id="ancora">

      <!-- Personagem 1: à frente -->
      <a-entity
        gltf-model="#personagem1"
        position="0 0 1"
        rotation="0 180 0"
        scale="0.5 0.5 0.5"
        animation-mixer>
      </a-entity>

      <!-- Personagem 2: à esquerda -->
      <a-entity
        gltf-model="#personagem2"
        position="-1 0 0"
        rotation="0 90 0"
        scale="0.5 0.5 0.5"
        animation-mixer>
      </a-entity>

      <!-- Personagem 3: à direita -->
      <a-entity
        gltf-model="#personagem3"
        position="1 0 0"
        rotation="0 -90 0"
        scale="0.5 0.5 0.5"
        animation-mixer>
      </a-entity>

      <!-- Luz para os modelos não ficarem escuros -->
      <a-light type="ambient" intensity="0.9"></a-light>
      <a-light type="directional" intensity="0.6" position="1 2 1"></a-light>
    </a-marker>

    <!-- Câmera do AR (não mexer) -->
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // Esconde a dica assim que o marcador for detectado a primeira vez.
    const marker = document.querySelector('#ancora');
    const dica = document.querySelector('#dica');
    marker.addEventListener('markerFound', () => { dica.style.display = 'none'; });
    marker.addEventListener('markerLost',  () => { dica.style.display = 'block'; });
  </script>
</body>
</html>
